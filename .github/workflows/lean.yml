name: Lean kernel check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORMAL_CONJECTURES_COMMIT: e923379e609b9d5987011a1d1f06ec22ea25cd20
  AMRA_COMMIT: e4e339e5b380375cf1c7838251966d0fc3c06929

jobs:
  prove-wowii19:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out evidence repository
        uses: actions/checkout@v4

      - name: Install Lean toolchain manager
        shell: bash
        run: |
          set -euxo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch exact pinned proof sources
        shell: bash
        run: |
          set -euxo pipefail

          git init formal-conjectures
          git -C formal-conjectures remote add origin \
            https://github.com/google-deepmind/formal-conjectures.git
          git -C formal-conjectures fetch --depth=1 origin "$FORMAL_CONJECTURES_COMMIT"
          git -C formal-conjectures checkout --detach FETCH_HEAD

          git init amra
          git -C amra remote add origin https://github.com/chainstart/amra.git
          git -C amra fetch --depth=1 origin "$AMRA_COMMIT"
          git -C amra checkout --detach FETCH_HEAD

          test "$(git -C formal-conjectures rev-parse HEAD)" = "$FORMAL_CONJECTURES_COMMIT"
          test "$(git -C amra rev-parse HEAD)" = "$AMRA_COMMIT"

      - name: Generate definition-preserving standalone port
        shell: bash
        run: |
          set -euxo pipefail
          python3 -m py_compile scripts/generate_lean_port.py
          python3 scripts/generate_lean_port.py \
            --formal formal-conjectures \
            --amra amra
          ! grep -RInE '\b(sorry|admit|axiom)\b' \
            formal-conjectures/FormalConjectures/WrittenOnTheWallII/GraphConjecture19BipartiteSupport.lean \
            formal-conjectures/FormalConjectures/WrittenOnTheWallII/GraphConjecture19Conjecture13Support.lean \
            formal-conjectures/FormalConjectures/WrittenOnTheWallII/GraphConjecture19Solved.lean

      - name: Record exact environment
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euxo pipefail
          cat lean-toolchain
          grep -n '"name": "mathlib"' -A8 lake-manifest.json
          lake --version
          lean --version

      - name: Download Mathlib build cache
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euxo pipefail
          lake exe cache get

      - name: Kernel-check exact theorem artifact
        shell: bash
        working-directory: formal-conjectures
        run: |
          set -euxo pipefail
          lake env lean \
            FormalConjectures/WrittenOnTheWallII/GraphConjecture19Solved.lean \
            2>&1 | tee ../lean-build.log

      - name: Preserve generated evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii19-generated-port
          if-no-files-found: warn
          path: |
            formal-conjectures/FormalConjectures/WrittenOnTheWallII/GraphConjecture19BipartiteSupport.lean
            formal-conjectures/FormalConjectures/WrittenOnTheWallII/GraphConjecture19Conjecture13Support.lean
            formal-conjectures/FormalConjectures/WrittenOnTheWallII/GraphConjecture19Solved.lean
            lean-build.log
