name: Lean kernel check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORMAL_CONJECTURES_COMMIT: e923379e609b9d5987011a1d1f06ec22ea25cd20
  AMRA_COMMIT: e4e339e5b380375cf1c7838251966d0fc3c06929

jobs:
  prove-wowii19:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out evidence repository
        uses: actions/checkout@v4

      - name: Restore Lean and Mathlib caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            ~/.cache/mathlib
          key: wow19-lean427-mathlib-a3a10db0-v1

      - name: Run complete isolated port
        id: proof
        continue-on-error: true
        shell: bash
        run: bash scripts/run_port_ci.sh

      - name: Publish inspectable CI result branch
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          test -d ci-output
          cd ci-output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b ci-results
          git add .
          git commit -m "CI result for ${GITHUB_SHA}"
          git remote add origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin ci-results

      - name: Preserve downloadable evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wowii19-generated-port
          if-no-files-found: warn
          path: ci-output/

      - name: Enforce kernel-check result
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          test -f ci-output/exit_code
          exit "$(cat ci-output/exit_code)"
